\n      background: #faf7f3;\n      border: 1px solid #b5a48a;\n      color: #6b6355;\n      font-size: 0.95rem;\n    }\n    .info-letter .notice-box::before {\n      content: \"Data Protection Notice\";\n      display: block;\n      margin-bottom: 0.5rem;\n      color: #7a2e2e;\n      font-size: 0.78rem;\n      font-weight: bold;\n      letter-spacing: 0.1em;\n      text-transform: uppercase;\n    }\n    .info-letter .consent-para {\n      margin: 1.5rem 0;\n      padding: 0.9rem 0;\n      border-top: 1px solid #b5a48a;\n      border-bottom: 1px solid #b5a48a;\n      color: #6b6355;\n      font-style: italic;\n    }\n    .info-letter .closing {\n      margin-top: 2rem;\n    }\n    .info-letter .signature-block {\n      margin-top: 2rem;\n    }\n    .info-letter .signature-name {\n      font-size: 1.05rem;\n      font-weight: bold;\n    }\n    .info-letter .signature-title,\n    .info-letter .signature-contact {\n      margin-top: 0.25rem;\n      color: #6b6355;\n      font-size: 0.9rem;\n    }\n    .info-letter .footer-rule {\n      margin-top: 2.5rem;\n      padding-top: 0.8rem;\n      border-top: 1px solid #b5a48a;\n      color: #6b6355;\n      font-size: 0.75rem;\n      text-align: center;\n      letter-spacing: 0.05em;\n    }\n    @media (max-width: 700px) {\n      .info-letter {\n        padding: 2rem 1.5rem;\n        font-size: 16px;\n      }\n      .info-letter .letterhead {\n        flex-direction: column;\n      }\n      .info-letter .letterhead-right {\n        text-align: left;\n      }\n    }\n

  </style>\n</head>\n<body>\n<div class=\"info-letter\">\n  <div class=\"letterhead\">\n    <div class=\"letterhead-left\">\n      <h1>University of Malta</h1>\n      <p>Information and Consent Letter</p>\n    </div>\n    <div class=\"letterhead-right\">\n      <p>Dr. Ing. Lawrence Farrugia Caruana &amp; Dr. Jacqueline Żammit</p>\n      <p>Senior Lecturers, Faculty of Education</p>\n      <p>University of Malta</p>\n      <p>\n        <a href=\"mailto:lawrence.farrugia@um.edu.mt\">lawrence.farrugia@um.edu.mt</a>\n      </p>\n      <p>\n        <a href=\"mailto:jacqueline.zammit@um.edu.mt\">jacqueline.zammit@um.edu.mt</a>\n      </p>\n    </div>\n  </div>\n\n  <div class=\"subject-block\">\n    <strong>Re:</strong> Invitation to Participate in a Research Study on\n    <em>Teachers&#x2019; Perceptions of Virtual Reality in Maltese Language Teaching</em>\n  </div>\n\n  <p class=\"salutation\">Dear Sir/Madam,</p>\n\n  <div class=\"letter-body\">\n    <p>\n      My name is <strong>Dr. Ing. Lawrence Farrugia Caruana</strong> and I am conducting this research\n      together with <strong>Dr. Jacqueline Żammit</strong>. We are presently carrying out a study\n      investigating <em>in-service Maltese language teachers&#x2019; perceptions of virtual reality (VR)\n      technology</em> as a tool for language teaching. Specifically, the study examines teachers&#x2019;\n      beliefs regarding the value of VR for student learning, their expectations of success in using it,\n      and the perceived costs and practical challenges associated with its implementation in the Maltese\n      language classroom. The study also explores whether prior experience with VR technology is related\n      to these beliefs, and how teachers perceive the potential of VR for teaching Maltese in terms of\n      cultural relevance, motivational value, and curricular fit.\n    </p>\n    <p>\n      Should you agree to participate, you will be invited to take part in a three-stage process. First,\n      you will be asked to complete a brief background questionnaire capturing information about your\n      teaching experience, technology use, and any prior exposure to VR. You will then be invited to\n      experience a 360-degree interactive Maltese language VR tool individually, for approximately\n      15&#x2013;20 minutes. Immediately following this experience, you will be asked to complete a\n      post-session questionnaire to capture your reflections and perceptions while impressions are fresh.\n      Some participants may subsequently be invited to take part in a short follow-up interview; however,\n      this is entirely optional and separate consent will be sought at that stage.\n    </p>\n    <p>\n      Participation in this study is entirely voluntary; you are free to accept or refuse to participate\n      without giving a reason. You are also free to withdraw from the study at any time without needing\n      to provide any explanation and without any negative repercussions for you.\n    </p>\n    <p>\n      All data will be collected via a secure online platform and stored in anonymised form on a\n      password-protected device accessible only to the researchers. Raw data will be retained until\n      June 2027, after which it will be securely wiped using dedicated deletion software from all\n      devices and the online platform. No personally identifiable information such as IP addresses,\n      e-mail addresses, timestamps, or other metadata is collected or stored at any point. Anonymised\n      data may be used in publications or future research.\n    </p>\n    <p>\n      While there are no direct, immediate benefits to you personally, your responses will contribute\n      to an important and growing area of research. The findings of this study may inform University\n      policy and practice regarding the integration of VR technologies in Maltese language education,\n      with the long-term aim of supporting more effective, engaging, and culturally grounded approaches\n      to language teaching in Malta.\n    </p>\n\n    <div class=\"notice-box\">\n      As a participant, you have the right under the\n      <strong>General Data Protection Regulation (GDPR)</strong>\n      and national legislation to access, rectify and, where applicable, ask for the data concerning you\n      to be erased. All data collected will be stored in an anonymised form on completion of the study\n      and publication of results.\n    </div>\n\n    <p class=\"consent-para\">\n      By completing the questionnaire, you are providing consent to participate in the study. You are\n      also confirming that you are 18 years or over. All data collected is anonymous and will be treated\n      confidentially. Only the researchers endorsing this letter will have access to this data. Please\n      refrain from including names or identifying details in open-ended responses.\n    </p>\n\n    <p>\n      Thank you for your time and consideration. Should you have any questions or concerns, please do\n      not hesitate to contact us by e-mail at\n      <a href=\"mailto:lawrence.farrugia@um.edu.mt\">lawrence.farrugia@um.edu.mt</a> or\n      <a href=\"mailto:jacqueline.zammit@um.edu.mt\">jacqueline.zammit@um.edu.mt</a>.\n    </p>\n  </div>\n\n  <div class=\"closing\">\n    <p>Sincerely,</p>\n  </div>\n\n  <div class=\"signature-block\">\n    <div class=\"signature-name\">Dr. Ing. Lawrence Farrugia Caruana</div>\n    <div class=\"signature-title\">Senior Lecturer, Faculty of Education, University of Malta</div>\n    <div class=\"signature-contact\">\n      <a href=\"mailto:lawrence.farrugia@um.edu.mt\">lawrence.farrugia@um.edu.mt</a>\n    </div>\n    <br />\n    <div class=\"signature-name\">Dr. Jacqueline Żammit</div>\n    <div class=\"signature-title\">Senior Lecturer, Department of Languages and Humanities Education,<br />Faculty of Education, University of Malta</div>\n    <div class=\"signature-contact\">\n      <a href=\"mailto:jacqueline.zammit@um.edu.mt\">jacqueline.zammit@um.edu.mt</a>\n    </div>\n  </div>\n\n  <p class=\"footer-rule\">\n    This letter is issued for research purposes only &mdash; University of Malta. For research ethics queries please feel free to contact the Faculty of Education Research Ethics Committee on research-ethics.educ@um.edu.mt\n  </p>\n</div>\n</body>\n</html>\n"

    function setupDynamicStickyMatrixHeaders(questionNames) {
      document.querySelectorAll(".lf-floating-matrix-header").forEach(function(el) {
        el.remove();
      });

      const stickyInstances = [];

      questionNames.forEach(function(questionName) {
        const questionRoot =
          document.querySelector('[data-name="' + questionName + '"]') ||
          Array.from(document.querySelectorAll(".lf-section-sticky-matrix")).find(function(el) {
            return el.textContent && el.textContent.length > 0;
          });

        if (!questionRoot) return;

        const table = questionRoot.querySelector("table");
        const thead = table ? table.querySelector("thead") : null;
        const headerRow = thead ? thead.querySelector("tr") : null;

        if (!table || !thead || !headerRow) return;

        const floating = document.createElement("div");
        floating.className = "lf-floating-matrix-header";
        floating.setAttribute("data-question-name", questionName);

        const cloneTable = document.createElement("table");
        const cloneHead = document.createElement("thead");
        cloneHead.appendChild(headerRow.cloneNode(true));
        cloneTable.appendChild(cloneHead);
        floating.appendChild(cloneTable);
        document.body.appendChild(floating);

        stickyInstances.push({
          questionRoot: questionRoot,
          table: table,
          thead: thead,
          headerRow: headerRow,
          floating: floating
        });
      });

      function syncHeaders() {
        stickyInstances.forEach(function(instance) {
          const tableRect = instance.table.getBoundingClientRect();
          const theadRect = instance.thead.getBoundingClientRect();
          const questionRect = instance.questionRoot.getBoundingClientRect();
          const viewportTop = 0;

          const shouldShow =
            tableRect.top < viewportTop &&
            tableRect.bottom > theadRect.height + 20 &&
            questionRect.top < viewportTop &&
            questionRect.bottom > 80;

          if (!shouldShow) {
            instance.floating.style.display = "none";
            return;
          }

          instance.floating.style.display = "block";
          instance.floating.style.left = tableRect.left + "px";
          instance.floating.style.width = tableRect.width + "px";

          const originalCells = Array.from(instance.headerRow.children);
          const cloneCells = Array.from(instance.floating.querySelectorAll("th, td"));

          originalCells.forEach(function(cell, i) {
            if (cloneCells[i]) {
              const rect = cell.getBoundingClientRect();
              cloneCells[i].style.width = rect.width + "px";
              cloneCells[i].style.minWidth = rect.width + "px";
              cloneCells[i].style.maxWidth = rect.width + "px";
            }
          });
        });
      }

      if (window.__lfStickySync) {
        window.removeEventListener("scroll", window.__lfStickySync);
        window.removeEventListener("resize", window.__lfStickySync);
      }

      window.__lfStickySync = function() {
        window.requestAnimationFrame(syncHeaders);
      };

      window.addEventListener("scroll", window.__lfStickySync, { passive: true });
      window.addEventListener("resize", window.__lfStickySync);

      stickyInstances.forEach(function(instance) {
        [instance.questionRoot, instance.table.parentElement].filter(Boolean).forEach(function(el) {
          el.addEventListener("scroll", window.__lfStickySync, { passive: true });
        });
      });

      setTimeout(syncHeaders, 250);
    }
