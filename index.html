alta</h1><p>Information and Consent Letter</p></div><div class='letterhead-right'><p>Dr. Ing. Lawrence Farrugia Caruana &amp; Dr. Jacqueline Żammit</p><p>Senior Lecturers, Faculty of Education</p><p>University of Malta</p><p><a href='mailto:lawrence.farrugia@um.edu.mt'>lawrence.farrugia@um.edu.mt</a></p><p><a href='mailto:jacqueline.zammit@um.edu.mt'>jacqueline.zammit@um.edu.mt</a></p></div></div><div class='subject-block'><strong>Re:</strong> Invitation to Participate in a Research Study on <em>Teachers&#8217; Perceptions of Virtual Reality in Maltese Language Teaching</em></div><p class='salutation'>Dear Sir/Madam,</p><p>My name is <strong>Dr. Ing. Lawrence Farrugia Caruana</strong> and I am conducting this research together with <strong>Dr. Jacqueline Żammit</strong>. We are presently carrying out a study investigating <em>in-service Maltese language teachers&#8217; perceptions of virtual reality (VR) technology</em> as a tool for language teaching. Specifically, the study examines teachers&#8217; beliefs regarding the value of VR for student learning, their expectations of success in using it, and the perceived costs and practical challenges associated with its implementation in the Maltese language classroom.</p><p>Should you agree to participate, you will be invited to take part in a three-stage process. First, you will be asked to complete a brief background questionnaire. You will then be invited to experience a 360-degree interactive Maltese language VR tool individually, for approximately 15&#8211;20 minutes. Immediately following this experience, you will be asked to complete a post-session questionnaire.</p><p>Participation in this study is entirely voluntary. You are free to withdraw at any time without any negative repercussions.</p><p>All data will be collected via a secure online platform and stored in anonymised form. No personally identifiable information is collected or stored at any point. Anonymised data may be used in publications or future research.</p><div class='notice-box'>As a participant, you have the right under the <strong>General Data Protection Regulation (GDPR)</strong> and national legislation to access, rectify and, where applicable, ask for the data concerning you to be erased.</div><p class='consent-para'>By completing the questionnaire, you are providing consent to participate in the study. You are also confirming that you are 18 years or over. All data collected is anonymous and will be treated confidentially.</p><p>Thank you for your time. Should you have any questions, please contact us at <a href='mailto:lawrence.farrugia@um.edu.mt'>lawrence.farrugia@um.edu.mt</a> or <a href='mailto:jacqueline.zammit@um.edu.mt'>jacqueline.zammit@um.edu.mt</a>.</p><div style='margin-top:2rem'><div class='signature-name'>Dr. Ing. Lawrence Farrugia Caruana</div><div class='signature-title'>Senior Lecturer, Faculty of Education, University of Malta</div></div><div style='margin-top:1rem'><div class='signature-name'>Dr. Jacqueline Żammit</div><div class='signature-title'>Senior Lecturer, Department of Languages and Humanities Education, Faculty of Education, University of Malta</div></div><p class='footer-rule'>This letter is issued for research purposes only &mdash; University of Malta. For research ethics queries please contact research-ethics.educ@um.edu.mt</p></div>"
